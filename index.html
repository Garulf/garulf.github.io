<script>
(function () {
'use strict';

const CMDS = ['whoami', 'ls -la ~/garulf'];
const SLUGS = ['flow-launcher-python-plugin', 'home-assistant-launcher', 'steam-no-mouse', 'catppuccin-mocha'];

const $ = id => document.getElementById(id);
const body = $('js-body');

// ── state ──────────────────────────────────────────────────────────────────
let typing = {};
let sectionTyping = false;
let revealLock = false;
let promptVisible = [true, false];
let lastY = 0;
let allInjected = [];
let visibleCount = 0;
let injectId = 0;
let navListeners = [];

// ── initial two sections ───────────────────────────────────────────────────
function startTyping(i) {
  if (typing[i]) return;
  typing[i] = true;
  sectionTyping = true;

  const cmdEl = $('cmd' + i);
  const curEl = $('cur' + i);
  if (curEl) curEl.style.display = 'inline-block';

  const full = CMDS[i];
  let n = 0;
  const tick = () => {
    n++;
    if (cmdEl) cmdEl.textContent = full.slice(0, n);
    if (n < full.length) {
      setTimeout(tick, 14 + Math.random() * 12);
    } else {
      setTimeout(() => {
        if (curEl) curEl.style.display = 'none';
        showStaticOutput(i);
        sectionTyping = false;
        setTimeout(() => {
          if (i === CMDS.length - 1) {
            $('close-prompt').style.display = 'flex';
          } else {
            promptVisible[i + 1] = true;
            const nextBlock = $('block' + (i + 1));
            nextBlock.style.display = 'block';
            const nextCur = $('cur' + (i + 1));
            if (nextCur) nextCur.style.display = 'inline-block';
            maybeAutoAdvance();
          }
          body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
        }, 380);
      }, 200);
    }
  };
  setTimeout(tick, 60);
}

function showStaticOutput(i) {
  const el = $('out' + i);
  el.style.display = 'block';
  const div = document.createElement('div');
  div.className = 'reveal';
  div.innerHTML = i === 0 ? whoamiHtml() : lsHtml();
  el.appendChild(div);
  bindLinks(div);
}

function maybeAutoAdvance() {
  setTimeout(() => {
    let next = -1;
    for (let i = 1; i < CMDS.length; i++) {
      if (promptVisible[i] && !typing[i]) { next = i; break; }
    }
    if (next !== 1) return;
    const scrollable = body.scrollHeight > body.clientHeight + 24;
    if (!scrollable) revealNext();
  }, 1100);
}

function revealNext() {
  if (revealLock || sectionTyping) return;
  let next = -1;
  for (let i = 1; i < CMDS.length; i++) {
    if (promptVisible[i] && !typing[i]) { next = i; break; }
  }
  if (next === -1) return;
  revealLock = true;
  setTimeout(() => { revealLock = false; }, 400);
  startTyping(next);
}

// ── injected sections ──────────────────────────────────────────────────────
function injectSection(type) {
  const postIdx = type.startsWith('post') ? parseInt(type.slice(4)) : -1;
  const cmdMap = {
    projects: 'cat ./projects/*',
    writing: 'ls ~/blog/posts | head -n 4',
    contact: 'whoami',
    nav: 'ls -la ~/garulf'
  };
  const cmd = postIdx >= 0 ? 'cat ./writing/' + SLUGS[postIdx] + '.md' : (cmdMap[type] || '');
  const id = ++injectId;

  allInjected = allInjected.slice(0, visibleCount);
  allInjected.push({ id, type });
  visibleCount++;
  history.pushState({ injLen: visibleCount }, '');

  const container = $('injected');
  const block = document.createElement('div');
  block.setAttribute('data-inject-id', String(id));
  block.style.marginBottom = '48px';
  block.innerHTML =
    '<div style="display:flex;align-items:center;flex-wrap:wrap;font-size:20px;">' +
      '<span style="color:#a6e3a1;">garulf</span><span style="color:#6c7086;">@</span>' +
      '<span style="color:#94e2d5;">github</span><span style="color:#6c7086;">&nbsp;</span>' +
      '<span style="color:#89b4fa;">~</span><span style="color:#cba6f7;">&nbsp;$&nbsp;</span>' +
      '<span id="ic-' + id + '" style="color:#cdd6f4;"></span>' +
      '<span id="icr-' + id + '" class="cursor"></span>' +
    '</div>' +
    '<div id="io-' + id + '" style="display:none;margin-top:20px;"></div>';
  container.appendChild(block);

  setTimeout(() => body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }), 100);

  if (type === 'nav') {
    setTimeout(() => {
      const ic = $('ic-' + id);
      if (ic) ic.textContent = cmd;
      setTimeout(() => {
        showInjectOutput(id, type);
        setTimeout(() => body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }), 100);
      }, 80);
    }, 40);
    return;
  }

  let n = 0;
  const tick = () => {
    n++;
    const ic = $('ic-' + id);
    if (ic) ic.textContent = cmd.slice(0, n);
    if (n < cmd.length) {
      setTimeout(tick, 7 + Math.random() * 7);
    } else {
      setTimeout(() => {
        showInjectOutput(id, type);
        setTimeout(() => body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }), 200);
        setTimeout(() => maybeInjectNav(), 400);
      }, 150);
    }
  };
  setTimeout(tick, 40);
}

function showInjectOutput(id, type) {
  const cur = $('icr-' + id);
  if (cur) cur.style.display = 'none';
  const out = $('io-' + id);
  if (!out) return;
  out.style.display = 'block';
  const div = document.createElement('div');
  div.className = 'reveal';
  div.innerHTML = renderContent(type);
  out.appendChild(div);
  bindLinks(div);
}

function maybeInjectNav() {
  const nearBottom = () => body.scrollTop + body.clientHeight >= body.scrollHeight - 160;
  if (nearBottom()) { setTimeout(() => injectSection('nav'), 500); return; }
  const check = () => {
    if (nearBottom()) {
      body.removeEventListener('scroll', check);
      navListeners = navListeners.filter(f => f !== check);
      setTimeout(() => injectSection('nav'), 500);
    }
  };
  body.addEventListener('scroll', check, { passive: true });
  navListeners.push(check);
}

// ── link binding ───────────────────────────────────────────────────────────
function bindLinks(container) {
  container.querySelectorAll('[data-inject]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); injectSection(a.dataset.inject); });
  });
  container.querySelectorAll('[data-post]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); injectSection('post' + a.dataset.post); });
  });
}

// ── content renderers ──────────────────────────────────────────────────────
function renderContent(type) {
  if (type === 'projects') return projectsHtml();
  if (type === 'writing') return writingHtml();
  if (type === 'contact') return contactHtml();
  if (type === 'nav') return navHtml();
  const i = parseInt(type.slice(4));
  if (!isNaN(i)) return postHtml(i);
  return '';
}
